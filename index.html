<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Golf Bet Tracker</title>
    <style>
        :root {
            --grass-green: #2ecc71;
            --glass-white: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Background uses your course.jpg with a dark overlay for readability */
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), 
                        url('course.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            display: flex;
            justify-content: center;
            /* Extra top padding (80px) to clear the iPhone notch/island */
            padding: 80px 20px 60px 20px; 
            min-height: 100vh;
            color: #222;
        }

        .container { width: 100%; max-width: 420px; text-align: center; }

        /* Player Visualization */
        .player-row { 
            display: flex; 
            justify-content: space-around; 
            margin-bottom: 40px;
            gap: 10px; 
        }
        
        .player-card { 
            width: 48%; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; 
        }
        
        .amount-bubble {
            background: white;
            border-radius: 50px;
            padding: 12px 5px;
            font-weight: 900;
            font-size: 26px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            border: 3px solid var(--grass-green);
        }

        .avatar { 
            width: 100%; 
            border-radius: 25px; 
            border: 6px solid white; 
            display: block; 
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
            background: rgba(255,255,255,0.2);
        }

        /* Status Logic */
        .winner { transform: scale(1.12); z-index: 5; }
        .winner .avatar { border-color: #FFD700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
        .loser { filter: grayscale(100%); opacity: 0.5; transform: scale(0.85); }

        /* Glass Cards */
        .glass-card { 
            background: var(--glass-white); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px; 
            border-radius: 30px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            margin-bottom: 25px;
        }
        
        input, select, button {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px;
            border: 1px solid #ccc; font-size: 16px; box-sizing: border-box;
            outline: none;
        }

        button { 
            background: #27ae60; 
            color: white; 
            border: none; 
            font-weight: 800; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #95a5a6; }

        /* History Table */
        .history-list { text-align: left; }
        .history-header { 
            font-size: 18px; 
            font-weight: 800; 
            margin-bottom: 15px; 
            display: block; 
            border-bottom: 2px solid rgba(0,0,0,0.05);
            padding-bottom: 5px;
        }
        .history-item { 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
            padding: 12px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .history-item b { font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div class="player-row">
        <div id="brady-card" class="player-card">
            <div id="brady-val" class="amount-bubble">$0</div>
            <img src="brady.png" class="avatar">
        </div>
        <div id="evan-card" class="player-card">
            <div id="evan-val" class="amount-bubble">$0</div>
            <img src="evan.png" class="avatar">
        </div>
    </div>

    <div class="glass-card">
        <input type="text" id="course" placeholder="What Course?">
        <select id="winner">
            <option value="brady">Brady Won</option>
            <option value="evan">Evan Won</option>
        </select>
        <input type="number" id="amt" placeholder="Amount ($)">
        <button id="logBtn" onclick="logRound()">LOG ROUND</button>
    </div>

    <div class="glass-card history-list">
        <span class="history-header">Season History</span>
        <div id="history-content">Loading scores...</div>
    </div>
</div>

<script>
    const DB_URL = "https://script.google.com/macros/s/AKfycbya8TWPdAnj1C2KOF8-mRdvB8DlpRIESP1972L4MySQTD7mD_s1yv_-Do-P4fbwSyMA/exec";
    let rounds = [];

    async function loadData() {
        try {
            const response = await fetch(DB_URL);
            rounds = await response.json();
            updateUI();
        } catch (e) {
            document.getElementById('history-content').innerText = "Data currently offline.";
        }
    }

    function updateUI() {
        let bradyNet = 0;
        rounds.forEach(r => {
            const val = parseFloat(r.amount);
            if(r.winner.toLowerCase() === 'brady') bradyNet += val;
            else bradyNet -= val;
        });

        let evanNet = -bradyNet;

        // Update Money Labels
        document.getElementById('brady-val').innerText = (bradyNet >= 0 ? '+$' : '-$') + Math.abs(bradyNet);
        document.getElementById('evan-val').innerText = (evanNet >= 0 ? '+$' : '-$') + Math.abs(evanNet);

        // Update Winner Visuals (The player with the most net winnings gets the crown)
        document.getElementById('brady-card').className = bradyNet >= evanNet ? 'player-card winner' : 'player-card loser';
        document.getElementById('evan-card').className = evanNet > bradyNet ? 'player-card winner' : 'player-card loser';

        // Render History
        document.getElementById('history-content').innerHTML = rounds.length ? rounds.map(r => `
            <div class="history-item">
                <span>${r.course}</span>
                <b style="color:${r.winner.toLowerCase()==='brady'?'#27ae60':'#e74c3c'}">
                    ${r.winner.toUpperCase()} +$${r.amount}
                </b>
            </div>
        `).reverse().join('') : "No rounds logged yet.";
    }

    async function logRound() {
        const btn = document.getElementById('logBtn');
        const course = document.getElementById('course').value;
        const winner = document.getElementById('winner').value;
        const amount = document.getElementById('amt').value;

        if (!course || !amount) return alert("Please enter course and amount!");

        btn.innerText = "SAVING...";
        btn.disabled = true;

        const newRound = { course, winner, amount };

        try {
            await fetch(DB_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(newRound)
            });
            
            // Wait for Google Sheets to process
            setTimeout(() => {
                loadData();
                btn.innerText = "LOG ROUND";
                btn.disabled = false;
                document.getElementById('course').value = '';
                document.getElementById('amt').value = '';
            }, 1500);

        } catch (e) {
            alert("Connection error. Try again.");
            btn.disabled = false;
        }
    }

    // Initial load
    loadData();
</script>

</body>
</html>
