<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Bet Tracker</title>
<style>
    :root {
        --sky-blue: #87CEEB;
        --grass-green: #76c74d;
        --fairway-dark: #5ea33d;
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        /* Improved Background: Added a gradient "horizon" feel */
        background: linear-gradient(to bottom, 
            var(--sky-blue) 0%, 
            #b0e2ff 35%, 
            var(--grass-green) 35%, 
            var(--fairway-dark) 100%);
        margin: 0;
        display: flex;
        justify-content: center;
        /* This "padding-top" brings the characters down from the notch */
        padding: 60px 20px 20px 20px; 
        min-height: 100vh;
    }

    .container { width: 100%; max-width: 400px; text-align: center; }

    .player-row { 
        display: flex; 
        justify-content: space-around; 
        margin-bottom: 30px;
        /* Added a little breathing room between characters */
        gap: 10px; 
    }
    
    .player-card { 
        width: 48%; 
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        position: relative; 
    }
    
    .amount-bubble {
        background: white;
        border-radius: 50px; /* Rounder look */
        padding: 10px 15px;
        font-weight: 800;
        font-size: 22px;
        box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        margin-bottom: 15px;
        border: 2px solid #eee;
    }

    .avatar { 
        width: 100%; 
        border-radius: 20px; 
        border: 5px solid white; 
        display: block; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    /* Effects */
    .winner { transform: scale(1.1); z-index: 2; }
    .winner .avatar { border-color: gold; }
    .loser { filter: grayscale(100%); opacity: 0.5; transform: scale(0.85); }

    /* Form Card */
    .card { 
        background: rgba(255, 255, 255, 0.95); 
        padding: 25px; 
        border-radius: 25px; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
        backdrop-filter: blur(5px);
    }
    
    input, select, button {
        width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px;
        border: 1px solid #ddd; font-size: 16px; box-sizing: border-box;
        -webkit-appearance: none; /* Makes it look better on iPhone */
    }

    button { 
        background: #27ae60; 
        color: white; 
        border: none; 
        font-weight: 800; 
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* History List */
    .history { 
        margin-top: 25px; 
        text-align: left; 
        background: white; 
        padding: 20px; 
        border-radius: 20px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .history-item { 
        border-bottom: 1px solid #f0f0f0; 
        padding: 12px 0; 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
    }
    .history-item:last-child { border: none; }
</style>
</head>
<body>

<div class="container">
    <div class="player-row">
        <div id="brady-card" class="player-card">
            <div id="brady-val" class="amount-bubble">$0</div>
            <img src="brady.png" class="avatar">
        </div>
        <div id="evan-card" class="player-card">
            <div id="evan-val" class="amount-bubble">$0</div>
            <img src="evan.png" class="avatar">
        </div>
    </div>

    <div class="card">
        <input type="text" id="course" placeholder="Course Name">
        <select id="winner">
            <option value="brady">Brady Won</option>
            <option value="evan">Evan Won</option>
        </select>
        <input type="number" id="amt" placeholder="Bet Amount ($)">
        <button onclick="logRound()">LOG ROUND</button>
    </div>

    <div class="history" id="history-box">
        <strong>History</strong>
        <div id="history-list"></div>
    </div>
</div>

<script>
    let rounds = JSON.parse(localStorage.getItem('golfHistory')) || [];

    function updateUI() {
        let bradyNet = 0;
        rounds.forEach(r => {
            if(r.winner === 'brady') bradyNet += r.amount;
            else bradyNet -= r.amount;
        });

        let evanNet = -bradyNet;

        // Update Numbers
        document.getElementById('brady-val').innerText = (bradyNet >= 0 ? '+$' : '-$') + Math.abs(bradyNet);
        document.getElementById('evan-val').innerText = (evanNet >= 0 ? '+$' : '-$') + Math.abs(evanNet);

        // Update Images (The one with more money stays in color)
        document.getElementById('brady-card').className = bradyNet >= evanNet ? 'player-card winner' : 'player-card loser';
        document.getElementById('evan-card').className = evanNet > bradyNet ? 'player-card winner' : 'player-card loser';

        // Update History List
        document.getElementById('history-list').innerHTML = rounds.map(r => `
            <div class="history-item">
                <span>${r.course}</span>
                <span style="color:${r.winner === 'brady' ? 'green' : 'red'}">${r.winner.toUpperCase()} +$${r.amount}</span>
            </div>
        `).reverse().join('');
    }

    function logRound() {
        const course = document.getElementById('course').value;
        const winner = document.getElementById('winner').value;
        const amount = parseInt(document.getElementById('amt').value);

        if (!course || !amount) return alert("Fill out the course and amount!");

        rounds.push({ course, winner, amount });
        localStorage.setItem('golfHistory', JSON.stringify(rounds));
        
        updateUI();
        document.getElementById('course').value = '';
        document.getElementById('amt').value = '';
    }

    // Run on load
    updateUI();
</script>

</body>
</html>
